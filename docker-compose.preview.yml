services:
  auth:
    image: ${REGISTRY_IMAGE}/auth:${IMAGE_TAG}
    restart: unless-stopped
    environment: &preview-environment
      APP_ENV: preview
      HIREPILOT_ENVIRONMENT: preview
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=70.0}
      PREVIEW_PR_NUMBER: ${PREVIEW_PR_NUMBER}
      SPRING_PROFILES_ACTIVE: preview
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-preview-proxy}
      - traefik.http.routers.hirepilot-pr-${PREVIEW_PR_NUMBER}-auth.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.hirepilot-pr-${PREVIEW_PR_NUMBER}-auth.rule=Host(`${PREVIEW_HOST}`) && PathPrefix(`/api/auth`)
      - traefik.http.routers.hirepilot-pr-${PREVIEW_PR_NUMBER}-auth.tls=true
      - traefik.http.routers.hirepilot-pr-${PREVIEW_PR_NUMBER}-auth.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.hirepilot-pr-${PREVIEW_PR_NUMBER}-auth.loadbalancer.server.port=8081
    networks:
      - preview-proxy

  candidate:
    image: ${REGISTRY_IMAGE}/candidate:${IMAGE_TAG}
