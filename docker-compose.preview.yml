      - traefik.http.routers.hirepilot-pr-${PREVIEW_PR_NUMBER}-candidate.rule=Host(`${PREVIEW_HOST}`) && PathPrefix(`/api/candidate`)
      - traefik.http.routers.hirepilot-pr-${PREVIEW_PR_NUMBER}-candidate.tls=true
      - traefik.http.routers.hirepilot-pr-${PREVIEW_PR_NUMBER}-candidate.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
