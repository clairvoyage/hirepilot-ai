services:
  auth:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: auth
        SERVICE_PORT: 8081
    image: hirepilot/auth:local
    environment:
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0}
    ports:
      - "8081:8081"

  candidate:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: candidate
        SERVICE_PORT: 8082
