name: PR Preview Deployment

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions:
  contents: read
  deployments: write
  issues: write
  packages: write
  pull-requests: write

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Preview Metadata
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      image_repository: ${{ steps.values.outputs.image_repository }}
      image_tag: ${{ steps.values.outputs.image_tag }}
      preview_host: ${{ steps.values.outputs.preview_host }}
      preview_url: ${{ steps.values.outputs.preview_url }}
      stack_name: ${{ steps.values.outputs.stack_name }}
      traefik_cert_resolver: ${{ steps.values.outputs.traefik_cert_resolver }}
      traefik_entrypoint: ${{ steps.values.outputs.traefik_entrypoint }}
      traefik_network: ${{ steps.values.outputs.traefik_network }}
    env:
      PREVIEW_BASE_DOMAIN: ${{ vars.PREVIEW_BASE_DOMAIN }}
      PREVIEW_SCHEME: ${{ vars.PREVIEW_SCHEME || 'https' }}
      PREVIEW_TRAEFIK_CERT_RESOLVER: ${{ vars.PREVIEW_TRAEFIK_CERT_RESOLVER || 'letsencrypt' }}
      PREVIEW_TRAEFIK_ENTRYPOINT: ${{ vars.PREVIEW_TRAEFIK_ENTRYPOINT || 'websecure' }}
      PREVIEW_TRAEFIK_NETWORK: ${{ vars.PREVIEW_TRAEFIK_NETWORK || 'preview-proxy' }}
    steps:
      - name: Compute preview values
        id: values
        shell: bash
        run: |
          if [[ -z "${PREVIEW_BASE_DOMAIN}" ]]; then
            echo "::error::Set the PREVIEW_BASE_DOMAIN repository variable before enabling PR previews."
            exit 1
          fi

          image_repository="ghcr.io/${GITHUB_REPOSITORY,,}"
          image_tag="pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::7}"
          preview_host="pr-${{ github.event.pull_request.number }}.${PREVIEW_BASE_DOMAIN}"
          preview_url="${PREVIEW_SCHEME}://${preview_host}"
          stack_name="hirepilot-pr-${{ github.event.pull_request.number }}"

          echo "image_repository=${image_repository}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "preview_host=${preview_host}" >> "${GITHUB_OUTPUT}"
          echo "preview_url=${preview_url}" >> "${GITHUB_OUTPUT}"
          echo "stack_name=${stack_name}" >> "${GITHUB_OUTPUT}"
          echo "traefik_cert_resolver=${PREVIEW_TRAEFIK_CERT_RESOLVER}" >> "${GITHUB_OUTPUT}"
          echo "traefik_entrypoint=${PREVIEW_TRAEFIK_ENTRYPOINT}" >> "${GITHUB_OUTPUT}"
          echo "traefik_network=${PREVIEW_TRAEFIK_NETWORK}" >> "${GITHUB_OUTPUT}"

  quality:
    name: Quality Gate
    if: github.event.action != 'closed'
    needs:
      - prepare
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          cache: maven
          distribution: temurin
          java-version: "25"

      - name: Run Maven quality gates
        run: mvn -B verify

  build-images:
    name: Build ${{ matrix.service }} Preview Image
    if: github.event.action != 'closed'
    needs:
      - prepare
      - quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth
            port: 8081
          - service: candidate
            port: 8082
          - service: employer
            port: 8083
          - service: jobs
            port: 8084
          - service: ai
            port: 8085
          - service: search
            port: 8086
          - service: integration
            port: 8087
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          password: ${{ github.token }}
          registry: ghcr.io
          username: ${{ github.actor }}

      - name: Build and push preview image
        uses: docker/build-push-action@v6
        with:
          build-args: |
            SERVICE=${{ matrix.service }}
            SERVICE_PORT=${{ matrix.port }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          context: .
          file: Dockerfile
          push: true
          tags: ${{ needs.prepare.outputs.image_repository }}/${{ matrix.service }}:${{ needs.prepare.outputs.image_tag }}

  deploy-preview:
    name: Deploy Preview
    if: github.event.action != 'closed'
    needs:
      - prepare
      - build-images
    runs-on: ubuntu-latest
    environment:
      name: preview-pr-${{ github.event.pull_request.number }}
      url: ${{ needs.prepare.outputs.preview_url }}
    env:
      GHCR_TOKEN: ${{ github.token }}
      GHCR_USERNAME: ${{ github.actor }}
      IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
      PREVIEW_HOST: ${{ needs.prepare.outputs.preview_host }}
      PREVIEW_REMOTE_ROOT: ${{ vars.PREVIEW_REMOTE_ROOT || 'hirepilot-previews' }}
      PREVIEW_SMOKE_ATTEMPTS: ${{ vars.PREVIEW_SMOKE_ATTEMPTS || '18' }}
      PREVIEW_SMOKE_CONNECT_TIMEOUT: ${{ vars.PREVIEW_SMOKE_CONNECT_TIMEOUT || '3' }}
      PREVIEW_SMOKE_MAX_TIME: ${{ vars.PREVIEW_SMOKE_MAX_TIME || '5' }}
      PREVIEW_SMOKE_SLEEP_SECONDS: ${{ vars.PREVIEW_SMOKE_SLEEP_SECONDS || '5' }}
      PREVIEW_SSH_HOST: ${{ secrets.PREVIEW_SSH_HOST }}
      PREVIEW_SSH_KEY: ${{ secrets.PREVIEW_SSH_KEY }}
      PREVIEW_SSH_USER: ${{ secrets.PREVIEW_SSH_USER }}
      PREVIEW_URL: ${{ needs.prepare.outputs.preview_url }}
      REGISTRY_IMAGE: ${{ needs.prepare.outputs.image_repository }}
      STACK_NAME: ${{ needs.prepare.outputs.stack_name }}
      TRAEFIK_CERT_RESOLVER: ${{ needs.prepare.outputs.traefik_cert_resolver }}
      TRAEFIK_ENTRYPOINT: ${{ needs.prepare.outputs.traefik_entrypoint }}
      TRAEFIK_NETWORK: ${{ needs.prepare.outputs.traefik_network }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate preview deployment secrets
        shell: bash
        run: |
          missing=0
          for name in PREVIEW_SSH_HOST PREVIEW_SSH_USER PREVIEW_SSH_KEY; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Set the ${name} repository secret before enabling PR previews."
              missing=1
            fi
          done
          exit "${missing}"

      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${PREVIEW_SSH_KEY}" > "${HOME}/.ssh/preview_deploy_key"
          chmod 600 "${HOME}/.ssh/preview_deploy_key"
          ssh-keyscan -H "${PREVIEW_SSH_HOST}" >> "${HOME}/.ssh/known_hosts"

      - name: Deploy preview stack
        shell: bash
        run: |
          ssh_target="${PREVIEW_SSH_USER}@${PREVIEW_SSH_HOST}"
          ssh_opts=(-i "${HOME}/.ssh/preview_deploy_key" -o StrictHostKeyChecking=yes)
          remote_dir="${PREVIEW_REMOTE_ROOT}/${STACK_NAME}"

          ssh "${ssh_opts[@]}" "${ssh_target}" "mkdir -p ${remote_dir@Q}"

          cat > .preview.env <<EOF
          IMAGE_TAG=${IMAGE_TAG}
          JAVA_OPTS=-XX:MaxRAMPercentage=70.0
          PREVIEW_HOST=${PREVIEW_HOST}
          PREVIEW_PR_NUMBER=${{ github.event.pull_request.number }}
          REGISTRY_IMAGE=${REGISTRY_IMAGE}
          STACK_NAME=${STACK_NAME}
          TRAEFIK_CERT_RESOLVER=${TRAEFIK_CERT_RESOLVER}
          TRAEFIK_ENTRYPOINT=${TRAEFIK_ENTRYPOINT}
          TRAEFIK_NETWORK=${TRAEFIK_NETWORK}
          EOF

          scp -i "${HOME}/.ssh/preview_deploy_key" -o StrictHostKeyChecking=yes docker-compose.preview.yml \
            "${ssh_target}:${remote_dir}/docker-compose.preview.yml"
          scp -i "${HOME}/.ssh/preview_deploy_key" -o StrictHostKeyChecking=yes .preview.env \
            "${ssh_target}:${remote_dir}/.env"

          printf '%s' "${GHCR_TOKEN}" | ssh "${ssh_opts[@]}" "${ssh_target}" \
            "docker login ghcr.io -u ${GHCR_USERNAME@Q} --password-stdin"

          ssh "${ssh_opts[@]}" "${ssh_target}" \
            "cd ${remote_dir@Q} && docker compose --env-file .env -f docker-compose.preview.yml pull && docker compose --env-file .env -f docker-compose.preview.yml up -d --remove-orphans"

      - name: Smoke test preview URL
        shell: bash
        run: |
          health_url="${PREVIEW_URL}/api/auth/health"

          echo "Smoke test URL: ${health_url}"
          echo "DNS result for ${PREVIEW_HOST}:"
          getent hosts "${PREVIEW_HOST}" || true

          echo "Checking TCP connectivity to ${PREVIEW_HOST}:443."
          if timeout 5 bash -c "cat < /dev/null > /dev/tcp/${PREVIEW_HOST}/443"; then
            echo "TCP 443 is reachable from the GitHub runner."
          else
            echo "::warning::TCP 443 is not reachable from the GitHub runner."
          fi

          for attempt in $(seq 1 "${PREVIEW_SMOKE_ATTEMPTS}"); do
            if curl \
              --connect-timeout "${PREVIEW_SMOKE_CONNECT_TIMEOUT}" \
              --max-time "${PREVIEW_SMOKE_MAX_TIME}" \
              --show-error \
              -fsS \
              "${health_url}"; then
              exit 0
            fi

            echo "Preview is not ready yet; retry ${attempt}/${PREVIEW_SMOKE_ATTEMPTS} in ${PREVIEW_SMOKE_SLEEP_SECONDS}s."
            sleep "${PREVIEW_SMOKE_SLEEP_SECONDS}"
          done

          echo "::error::Preview did not become healthy at ${health_url}."
          exit 1

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- hirepilot-preview-url -->';
            const body = [
              marker,
              '### Preview deployment ready',
              '',
              process.env.PREVIEW_URL,
              '',
              'This preview uses the non-production Spring `preview` profile and PR-scoped Docker images.',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.data.find((comment) => comment.user.type === 'Bot' && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo: repo, issue_number, body });
            }

  teardown-preview:
    name: Tear Down Preview
    if: github.event.action == 'closed'
    needs:
      - prepare
    runs-on: ubuntu-latest
    env:
      PREVIEW_REMOTE_ROOT: ${{ vars.PREVIEW_REMOTE_ROOT || 'hirepilot-previews' }}
      PREVIEW_SSH_HOST: ${{ secrets.PREVIEW_SSH_HOST }}
      PREVIEW_SSH_KEY: ${{ secrets.PREVIEW_SSH_KEY }}
      PREVIEW_SSH_USER: ${{ secrets.PREVIEW_SSH_USER }}
      PREVIEW_URL: ${{ needs.prepare.outputs.preview_url }}
      STACK_NAME: ${{ needs.prepare.outputs.stack_name }}
    steps:
      - name: Validate preview deployment secrets
        shell: bash
        run: |
          missing=0
          for name in PREVIEW_SSH_HOST PREVIEW_SSH_USER PREVIEW_SSH_KEY; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Set the ${name} repository secret before enabling PR previews."
              missing=1
            fi
          done
          exit "${missing}"

      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${PREVIEW_SSH_KEY}" > "${HOME}/.ssh/preview_deploy_key"
          chmod 600 "${HOME}/.ssh/preview_deploy_key"
          ssh-keyscan -H "${PREVIEW_SSH_HOST}" >> "${HOME}/.ssh/known_hosts"

      - name: Stop preview stack
        shell: bash
        run: |
          ssh_target="${PREVIEW_SSH_USER}@${PREVIEW_SSH_HOST}"
          ssh_opts=(-i "${HOME}/.ssh/preview_deploy_key" -o StrictHostKeyChecking=yes)
          remote_dir="${PREVIEW_REMOTE_ROOT}/${STACK_NAME}"

          ssh "${ssh_opts[@]}" "${ssh_target}" \
            "if [ -f ${remote_dir@Q}/docker-compose.preview.yml ]; then cd ${remote_dir@Q} && docker compose --env-file .env -f docker-compose.preview.yml down --remove-orphans; fi"

      - name: Comment preview removal
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- hirepilot-preview-url -->';
            const body = [
              marker,
              '### Preview deployment stopped',
              '',
              `The preview deployment for ${process.env.PREVIEW_URL} has been stopped because this PR was closed.`,
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.data.find((comment) => comment.user.type === 'Bot' && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
